server:
  port: 9981
nexus:
  file-upload-path: D:/upload/
  file-access-url: http://localhost:8380/
  aes-key: 1RR1JeyfUWvy1gmZFoO439Tk43dPdI92C1hZ6Tr2wFo=
spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    dynamic:
      druid:
        async-init: true
      primary: local-mysql
      strict: false
      datasource:
        local-mysql:
          url:  jdbc:mysql://127.0.0.1:3306/nexus?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
          username: root
          password: root
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'NEXUS-BOOT'
      paths-to-match: '/**'
      packages-to-scan: cn.dong.nexus.controller
    - group: 'RBAC'
      paths-to-match: '/**'
      packages-to-scan: cn.dong.nexus.modules.rbac
    - group: 'SYSTEM'
      paths-to-match: '/**'
      packages-to-scan: cn.dong.nexus.modules.system


sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: random-64
  is-log: true
  token-prefix: Bearer
  is-read-cookie: false
